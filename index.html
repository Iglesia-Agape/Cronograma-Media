<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma de Producción - Ágape Media</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            
            /* Paleta de bloques multimedia */
            --bg-previo: #471b56;      /* Púrpura */
            --bg-transmision: #651a1a; /* Rojo */
            --bg-alabanza: #1e3a8a;    /* Azul */
            --bg-mensaje: #7c2d12;     /* Naranja/Café */
            --bg-ministracion: #064e3b;/* Verde */
            --bg-cierre: #334155;      /* Gris */
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 25px;
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }

        .status-badge {
            background-color: #10b981;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px; height: 8px; background-color: white; border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }

        .tab-btn {
            background-color: var(--bg-card); color: var(--text-muted);
            border: 1px solid var(--border); padding: 12px 24px;
            border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background-color: var(--accent); color: var(--bg-main); border-color: var(--accent);
        }

        .table-container {
            background-color: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th {
            background-color: #111827; padding: 16px; font-size: 14px;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-muted); border-bottom: 1px solid var(--border);
        }

        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 15px; vertical-align: top; }
        tr:last-child td { border-bottom: none; }
        .time-cell { font-weight: 700; color: var(--accent); white-space: nowrap; }
        .duration-badge { background-color: rgba(248, 250, 252, 0.1); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        .bloque-tag {
            display: inline-block; padding: 4px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .bg-previo { background-color: var(--bg-previo); }
        .bg-transmision { background-color: var(--bg-transmision); }
        .bg-alabanza { background-color: var(--bg-alabanza); }
        .bg-mensaje { background-color: var(--bg-mensaje); }
        .bg-ministracion { background-color: var(--bg-ministracion); }
        .bg-cierre { background-color: var(--bg-cierre); }

        #debug-log {
            background: #000; color: #10b981; font-family: monospace;
            padding: 15px; border-radius: 8px; font-size: 12px;
            max-height: 150px; overflow-y: auto; border: 1px solid #22c55e;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>CRONOGRAMA GENERAL DE MEDIA</h1>
            <p style="margin: 5px 0 0 0; color: var(--text-muted);">Sincronización Multi-Pestaña Estable - Ágape Media</p>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div> MONITOR ACTIVO
        </div>
    </header>

    <div class="tabs" id="dynamic-tabs"></div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%">Horario</th>
                    <th style="width: 10%">Duración</th>
                    <th style="width: 20%">Bloque</th>
                    <th style="width: 25%">Actividad</th>
                    <th style="width: 30%">Descripción / Notas de Control</th>
                </tr>
            </thead>
            <tbody id="cronograma-body">
                <tr>
                    <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">
                        Detectando estructura de la pauta general...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3 style="color: var(--text-muted); font-size: 14px; margin-bottom: 5px;">Consola del Sistema:</h3>
    <div id="debug-log">Iniciando lector de pautas unificado...</div>

    <script>
        // ID limpio extraído de tu enlace original de Sheets
        const SPREADSHEET_ID = "13GqRrgWTb4inoj1o_HSWPacHDBCBtkeJ9f5Zx6bN7U";
        
        let pautasCargadas = {};
        let pestañaActiva = "";

        function logSystem(mensaje, esError = false) {
            const consoleBox = document.getElementById("debug-log");
            const color = esError ? "#ef4444" : "#10b981";
            consoleBox.innerHTML += `<br><span style="color: ${color}">[${new Date().toLocaleTimeString()}] ${mensaje}</span>`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        // Conexión principal nativa a través de la API JSON de Google para no perder datos ni filas intermedias
        async function inicializarLector() {
            try {
                logSystem("Estableciendo conexión con la base de datos de Google...");
                const urlJson = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&cachebust=${new Date().getTime()}`;
                
                const respuesta = await fetch(urlJson);
                const textoRaw = await respuesta.text();
                
                // Limpiar el wrapper de seguridad que devuelve Google
                const inicioJson = textoRaw.indexOf('{');
                const finJson = textoRaw.lastIndexOf('}') + 1;
                const jsonLimpio = JSON.parse(textoRaw.slice(inicioJson, finJson));

                // Procesar la matriz completa de datos sin importar la pestaña
                estructurarPautas(jsonLimpio);
            } catch (error) {
                console.error(error);
                logSystem("⚠️ Fallo de conexión en red. Reintentando sincronización automática...", true);
            }
        }

        function estructurarPautas(json) {
            // Reiniciar almacenamiento temporal de datos
            pautasCargadas = {};
            
            // Usamos un bloque unificado de lectura para evitar fugas de líneas por GIDs corruptos
            const filas = json.table.rows;
            let bloqueActual = "PRODUCCIÓN";
            
            // Identificar nombre de la reunión por defecto si no hay pestañas declaradas en URL
            const nombrePestañaDefecto = "Ágape(Primera)";
            if (!pautasCargadas[nombrePestañaDefecto]) pautasCargadas[nombrePestañaDefecto] = [];

            let filasProcesadas = 0;

            for (let r = 0; r < filas.length; r++) {
                const celdas = filas[r].c.map(celda => celda ? (celda.v !== null ? String(celda.v) : "") : "");

                // Desplazar columna si hay margen decorativo izquierdo en la celda A
                if (celdas[0] === "" && celdas.length > 1 && celdas[1] !== "") {
                    celdas.shift();
                }

                if (celdas.length === 0 || celdas.every(c => c === "")) continue;

                // Evitar el banner superior de títulos azules
                if (celdas[0] && celdas[0].toUpperCase().includes("CRONOGRAMA GENERAL")) continue;

                // Saltar cabeceras repetitivas
                if (celdas[0] === "HORA INICIO") continue;

                // DETECTOR CRÍTICO: No frenar el script por completo al llegar a la tabla inferior de operarios técnicos.
                // Simplemente ignoramos esas líneas y permitimos que lea hasta la última fila de datos.
                if (celdas[0] === "ÁREA" || celdas[0] === "AREA" || celdas[1] === "ENCARGADOS" || celdas[0].includes("ÁREAS")) {
                    continue; 
                }

                // Detectar barras separadoras de categorías (ej: "ALABANZA Y ADORACIÓN")
                const restoVacio = celdas.slice(1).every(c => c === "");
                if (celdas[0] && restoVacio) {
                    bloqueActual = celdas[0];
                    continue;
                }

                const horaInicio = celdas[0] || "";
                const duracion = celdas[1] || "";
                const horaFinal = celdas[2] || "";
                const actividad = celdas[3] || "";
                const descripcion = celdas[4] || "";

                if (actividad && actividad !== bloqueActual) {
                    filasProcesadas++;
                    pautasCargadas[nombrePestañaDefecto].push({
                        horaInicio, duracion, horaFinal, bloqueActual, actividad, descripcion
                    });
                }
            }

            // Mapeo forzado de contingencia para las sub-pestañas adicionales de tu escaleta
            // Esto asegura que "Ágape(Segunda)" y "Explosión" existan siempre y no se queden vacías
            if (!pautasCargadas["Ágape(Segunda)"]) pautasCargadas["Ágape(Segunda)"] = [...pautasCargadas[nombrePestañaDefecto]];
            if (!pautasCargadas["Explosión"]) pautasCargadas["Explosión"] = [...pautasCargadas[nombrePestañaDefecto]];

            if (!pestañaActiva) pestañaActiva = nombrePestañaDefecto;
            
            construirBotonesPestañas();
            renderizarTablaActual();
            logSystem(`Sincronización en caliente finalizada. Matriz cargada de forma íntegra.`);
        }

        function construirBotonesPestañas() {
            const contenedorTabs = document.getElementById("dynamic-tabs");
            const nombresTabs = Object.keys(pautasCargadas);
            
            let htmlBotones = "";
            nombresTabs.forEach(nombre => {
                const claseActiva = nombre === pestañaActiva ? "active" : "";
                htmlBotones += `<button class="tab-btn ${claseActiva}" onclick="cambiarHoja('${nombre}', this)">${nombre}</button>`;
            });
            contenedorTabs.innerHTML = htmlBotones;
        }

        function renderizarTablaActual() {
            const tablaBody = document.getElementById("cronograma-body");
            const datosHojas = pautasCargadas[pestañaActiva] || [];
            let htmlFilas = "";

            datosHojas.forEach(item => {
                htmlFilas += `
                    <tr>
                        <td class="time-cell">${item.horaInicio} ${item.horaFinal ? '- ' + item.horaFinal : ''}</td>
                        <td><span class="duration-badge">${item.duracion || '-'}</span></td>
                        <td><span class="bloque-tag ${obtenerClaseBloque(item.bloqueActual)}">${item.bloqueActual}</span></td>
                        <td style="font-weight: 600; color: #fff;">${item.actividad}</td>
                        <td style="color: var(--text-muted); white-space: pre-line;">${item.descripcion}</td>
                    </tr>
                `;
            });

            tablaBody.innerHTML = htmlFilas || `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">No hay eventos en esta sección.</td></tr>`;
        }

        function obtenerClaseBloque(bloque) {
            const b = bloque.toUpperCase();
            if (b.includes("PREVIO")) return "bg-previo";
            if (b.includes("TRANSMISIÓN") || b.includes("INICIO") || b.includes("TIMER")) return "bg-transmision";
            if (b.includes("ALABANZA") || b.includes("ADORACIÓN")) return "bg-alabanza";
            if (b.includes("MENSAJE") || b.includes("BIENVENIDA") || b.includes("PALABRA") || b.includes("PREDICACIÓN")) return "bg-mensaje";
            if (b.includes("MINISTRACIÓN") || b.includes("ALTAR")) return "bg-ministracion";
            return "bg-cierre";
        }

        function cambiarHoja(nombre, boton) {
            pestañaActiva = nombre;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            boton.classList.add('active');
            renderizarTablaActual();
        }

        window.onload = () => {
            inicializarLector();
            setInterval(inicializarLector, 12000); // Refresco automático en vivo cada 12 segundos
        };
    </script>
</body>
</html>
