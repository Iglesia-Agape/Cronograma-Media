<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma de Producción — Ágape Media</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-main:        #080c14;
            --bg-card:        #0e1625;
            --bg-elevated:    #162033;
            --text-main:      #e8f0ff;
            --text-muted:     #5a7090;
            --text-sub:       #8ba8c8;
            --accent:         #4f9eff;
            --accent-glow:    rgba(79,158,255,0.12);
            --border:         #1c2d45;
            --border-bright:  #243650;

            --c-previo:          #9333ea;  --c-previo-bg:       rgba(147,51,234,0.12);
            --c-transmision:     #ef4444;  --c-transmision-bg:  rgba(239,68,68,0.12);
            --c-alabanza:        #3b82f6;  --c-alabanza-bg:     rgba(59,130,246,0.12);
            --c-mensaje:         #f97316;  --c-mensaje-bg:      rgba(249,115,22,0.12);
            --c-ministracion:    #10b981;  --c-ministracion-bg: rgba(16,185,129,0.12);
            --c-cierre:          #64748b;  --c-cierre-bg:       rgba(100,116,139,0.12);
            --c-staff:           #a78bfa;
            --c-aviso:           #fbbf24;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(79,158,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79,158,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }

        .page-wrap { position: relative; z-index: 1; padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

        /* ── HEADER ── */
        header {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
            gap: 16px; flex-wrap: wrap;
        }
        .header-left h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .header-left .subtitle { margin-top: 4px; font-size: 13px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .live-badge {
            display: flex; align-items: center; gap: 7px;
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            color: #f87171; padding: 7px 14px; border-radius: 6px;
            font-size: 12px; font-weight: 700; letter-spacing: 1px;
        }
        .live-dot { width: 7px; height: 7px; background: #ef4444; border-radius: 50%; animation: pulse-red 1.4s ease-in-out infinite; }
        @keyframes pulse-red { 0%,100%{opacity:.4;transform:scale(.9)} 50%{opacity:1;transform:scale(1.1)} }

        .clock-badge {
            display: flex; align-items: center;
            background: var(--bg-card); border: 1px solid var(--border-bright);
            color: var(--accent); padding: 7px 14px; border-radius: 6px;
            font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
        }
        .sync-badge {
            display: flex; align-items: center; gap: 7px;
            background: var(--bg-card); border: 1px solid var(--border-bright);
            color: var(--text-muted); padding: 7px 14px; border-radius: 6px; font-size: 12px;
        }
        .sync-icon.spinning { animation: spin 1s linear infinite; display:inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ACTIVE BANNER ── */
        #active-banner {
            display: none; margin-bottom: 20px; padding: 14px 20px;
            border-radius: 10px; border: 1px solid rgba(79,158,255,0.2);
            border-left: 4px solid var(--accent); background: var(--accent-glow);
            animation: fadeIn .4s ease;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
        #active-banner .banner-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 6px; }
        #active-banner .banner-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        #active-banner .banner-title { font-size: 16px; font-weight: 700; }
        #active-banner .banner-block { font-size: 12px; color: var(--text-muted); }
        .progress-bar-wrap { margin-top: 10px; background: rgba(255,255,255,0.06); border-radius: 4px; height: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 1s linear; }

        /* ── TABS ── */
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .tab-btn {
            background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border);
            padding: 10px 22px; border-radius: 8px; font-weight: 600; font-size: 13px;
            cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
        }
        .tab-btn:hover { border-color: var(--border-bright); color: var(--text-sub); }
        .tab-btn.active { background: var(--accent-glow); color: var(--accent); border-color: rgba(79,158,255,0.4); }

        /* ── TOOLBAR ── */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .toolbar-left { display: flex; gap: 8px; }
        .view-btn {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted);
            padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif; transition: all .2s;
        }
        .view-btn.active { background: var(--bg-elevated); color: var(--text-main); border-color: var(--border-bright); }
        .stats-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .stat-chip { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 12px; color: var(--text-muted); }
        .stat-chip span { color: var(--text-main); font-weight: 700; }

        /* ── TABLE VIEW ── */
        .table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: rgba(8,12,20,0.8); padding: 13px 16px;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 600;
        }
        tbody td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr { transition: background .15s; }
        tbody tr:hover { background: rgba(255,255,255,0.015); }
        tbody tr.row-active { background: var(--accent-glow) !important; }

        .time-cell { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }
        .duration-chip { background: rgba(255,255,255,0.06); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text-sub); }
        .bloque-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; white-space: nowrap; }
        .bloque-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
        .actividad-cell { font-weight: 600; color: var(--text-main); }
        .desc-cell { color: var(--text-muted); font-size: 13px; white-space: pre-line; line-height: 1.5; }

        /* ── AVISO BADGE ── */
        .aviso-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3);
            color: var(--c-aviso); padding: 3px 10px; border-radius: 4px;
            font-size: 11px; font-weight: 700; white-space: nowrap;
        }

        /* ── STAFF ── */
        .staff-section-header td { background: rgba(167,139,250,0.05) !important; border-top: 2px solid rgba(167,139,250,0.2) !important; }
        .staff-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--c-staff); }
        .staff-name-cell { font-weight: 600; color: var(--c-staff); }

        /* ── CARD VIEW ── */
        #card-view { display: none; margin-bottom: 24px; }
        .timeline { display: grid; gap: 3px; }
        .card {
            display: grid; grid-template-columns: 110px 1fr auto;
            border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
            transition: border-color .2s, transform .2s;
            animation: slideIn .3s ease both;
        }
        .card:hover { border-color: var(--border-bright); transform: translateX(2px); }
        .card.card-active { border-color: var(--accent) !important; }
        @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }

        .card-time { background: var(--bg-card); padding: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-right: 1px solid var(--border); gap: 3px; }
        .card-time-start { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--accent); }
        .card-time-dur { font-size: 10px; color: var(--text-muted); font-weight: 600; }
        .card-time-end { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }

        .card-body { padding: 12px 16px; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
        .card-header-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .card-actividad { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

        .card-aviso {
            display: flex; align-items: center; padding: 0 14px;
            border-left: 1px solid var(--border);
            background: rgba(251,191,36,0.04);
        }

        /* Staff cards */
        .staff-section-title { margin-top: 28px; margin-bottom: 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 700; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        .staff-card { background: var(--bg-card); border: 1px solid var(--border-bright); border-radius: 10px; padding: 14px; border-left: 3px solid var(--c-staff); animation: slideIn .3s ease both; }
        .staff-card-area { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--c-staff); margin-bottom: 4px; }
        .staff-card-name { font-size: 15px; font-weight: 700; color: var(--text-main); }
        .staff-card-notes { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* ── CONSOLE ── */
        .console-wrap { margin-top: 8px; }
        .console-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
        #debug-log { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: #4ade80; font-family: 'JetBrains Mono', monospace; padding: 12px 14px; border-radius: 8px; font-size: 11px; max-height: 120px; overflow-y: auto; line-height: 1.6; }

        .state-cell { text-align: center; padding: 60px 20px !important; }
        .state-icon { font-size: 36px; margin-bottom: 10px; }
        .state-msg { color: var(--text-muted); font-size: 14px; }

        /* bloque pills */
        .pill-previo       { color:#9333ea; background:rgba(147,51,234,.12); }
        .pill-transmision  { color:#ef4444; background:rgba(239,68,68,.12); }
        .pill-alabanza     { color:#3b82f6; background:rgba(59,130,246,.12); }
        .pill-mensaje      { color:#f97316; background:rgba(249,115,22,.12); }
        .pill-ministracion { color:#10b981; background:rgba(16,185,129,.12); }
        .pill-cierre       { color:#64748b; background:rgba(100,116,139,.12); }

        .card-previo       { background:rgba(147,51,234,.04); }
        .card-transmision  { background:rgba(239,68,68,.04); }
        .card-alabanza     { background:rgba(59,130,246,.04); }
        .card-mensaje      { background:rgba(249,115,22,.04); }
        .card-ministracion { background:rgba(16,185,129,.04); }
        .card-cierre       { background:rgba(100,116,139,.04); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-logo {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border-bright);
            /* el logo es negro/blanco, invertimos para que luzca bien en fondo oscuro */
            filter: invert(1) brightness(0.85);
            flex-shrink: 0;
        }

        @media(max-width:700px){
            .page-wrap{padding:16px;}
            header{flex-direction:column;}
            .card{grid-template-columns:80px 1fr;}
            .card-aviso{display:none;}
            .header-logo{width:42px;height:42px;}
        }
    </style>
</head>
<body>
<div class="page-wrap">

    <header>
        <div class="header-left">
            <div class="header-brand">
                <img src="Logo-media.jpeg" alt="Ágape Media" class="header-logo" onerror="this.style.display='none'">
                <div>
                    <h1>CRONOGRAMA MEDIA</h1>
                    <div class="subtitle">ágape.media / control de producción</div>
                </div>
            </div>
        </div>
        <div class="header-right">
            <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
            <div class="clock-badge" id="live-clock">--:--:--</div>
            <div class="sync-badge"><span class="sync-icon" id="sync-icon">⟳</span><span id="sync-label">Iniciando…</span></div>
        </div>
    </header>

    <div id="active-banner">
        <div class="banner-label">▶ BLOQUE ACTUAL</div>
        <div class="banner-content">
            <div>
                <div class="banner-title" id="banner-title">—</div>
                <div class="banner-block" id="banner-block">—</div>
            </div>
            <div id="banner-time" style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted);"></div>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="banner-progress" style="width:0%"></div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarPestaña(0, this)">Ágape · Primera</button>
        <button class="tab-btn" onclick="cambiarPestaña(1, this)">Ágape · Segunda</button>
        <button class="tab-btn" onclick="cambiarPestaña(2, this)">Explosión</button>
    </div>

    <div class="toolbar">
        <div class="toolbar-left">
            <button class="view-btn active" id="btn-table" onclick="setView('table')">☰ Tabla</button>
            <button class="view-btn" id="btn-card" onclick="setView('card')">◫ Línea de tiempo</button>
        </div>
        <div class="stats-row" id="stats-row"></div>
    </div>

    <div id="table-view">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:13%">Hora inicio</th>
                        <th style="width:8%">Duración</th>
                        <th style="width:10%">Hora fin</th>
                        <th style="width:17%">Bloque</th>
                        <th style="width:20%">Actividad</th>
                        <th style="width:16%">Descripción / Notas</th>
                        <th style="width:16%">⚠ Avisos</th>
                    </tr>
                </thead>
                <tbody id="cronograma-body">
                    <tr><td colspan="7" class="state-cell"><div class="state-icon">⟳</div><div class="state-msg">Cargando flujo de datos…</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="card-view">
        <div class="timeline" id="card-timeline"></div>
        <div id="staff-card-section"></div>
    </div>

    <div class="console-wrap">
        <div class="console-label">Consola del sistema</div>
        <div id="debug-log">Iniciando secuenciador de pautas…</div>
    </div>

</div>

<script>
    /* ── CONFIG ── */
    /* Usamos dos formatos de URL: el /pub (para quien la publicó) y /export (más abierto).
       El fetch intenta ambos formatos a través de proxies CORS. */
    const SHEET_ID_PUBLICADO = "2PACX-1vTHX3umAF4N-HNU7qVBBj7TF6mHZTz9VIzNoAnyd1-kRL6J1Ig1zAdNnmMg9sb9dI7nS9N9XEc82wGb";
    const SHEET_ID_DIRECTO   = "13GqRrgWTb4inoj1o_HSwPacbHDBCBtkeJ9f5Zx6bN7U";
    const GIDS = { 0:"1584889573", 1:"1151618335", 2:"1931811566" };
    const POLL_INTERVAL = 15000;

    let pestañaActiva = 0;
    let vistaActual = "table";
    let datos = { actividades: [], staff: [] };

    /* ── RELOJ ── */
    function tickClock() {
        document.getElementById("live-clock").textContent =
            new Date().toLocaleTimeString("es-HN", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
    }
    setInterval(tickClock, 1000); tickClock();

    /* ── LOG ── */
    function log(msg, tipo = "ok") {
        const box = document.getElementById("debug-log");
        const c = { ok:"#4ade80", error:"#f87171", warn:"#fbbf24", info:"#60a5fa" }[tipo] || "#4ade80";
        box.innerHTML += `<br><span style="color:${c}">[${new Date().toLocaleTimeString("es-HN")}] ${msg}</span>`;
        box.scrollTop = box.scrollHeight;
    }

    /* ── FETCH con múltiples URLs + proxies CORS ──
       Estrategia: intentamos 3 formatos de URL × 3 proxies = 9 combinaciones.
       - URL /pub  → la que usabas (a veces da 401 en proxies)
       - URL /export → exportación directa, más confiable con proxies
       - URL /gviz  → endpoint de visualización, no requiere publicación pública
    ── */
    function urlsParaGid(gid) {
        const cb = Date.now();
        return [
            /* Formato 1: pub (la que ya tenías) */
            `https://docs.google.com/spreadsheets/d/e/${SHEET_ID_PUBLICADO}/pub?output=csv&gid=${gid}&single=true&cachebust=${cb}`,
            /* Formato 2: export directo por ID */
            `https://docs.google.com/spreadsheets/${SHEET_ID_DIRECTO}/export?format=csv&gid=${gid}&cachebust=${cb}`,
            /* Formato 3: gviz query */
            `https://docs.google.com/spreadsheets/d/${SHEET_ID_DIRECTO}/gviz/tq?tqx=out:csv&gid=${gid}&cachebust=${cb}`,
        ];
    }

    const WRAPPERS = [
        (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
        (u) => u,  /* directo — funciona en local, falla en GitHub Pages */
    ];

    function esCSVValido(texto) {
        if (!texto || texto.length < 20) return false;
        if (texto.trimStart().startsWith("<")) return false;  /* HTML = error */
        return true;
    }

    async function fetchConProxy(gid) {
        const urls = urlsParaGid(gid);
        for (const url of urls) {
            for (let wi = 0; wi < WRAPPERS.length; wi++) {
                const urlFinal = WRAPPERS[wi](url);
                try {
                    const res = await fetch(urlFinal, { signal: AbortSignal.timeout(7000) });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const texto = await res.text();
                    if (!esCSVValido(texto)) throw new Error("No es CSV válido");
                    log(`OK — proxy[${wi}] + formato[${urls.indexOf(url)}] — ${texto.split(/\r?\n/).length} líneas`, "ok");
                    return texto;
                } catch(e) {
                    log(`proxy[${wi}]+fmt[${urls.indexOf(url)}] falló: ${e.message}`, "warn");
                }
            }
        }
        throw new Error("No se pudo conectar con Google Sheets. Asegúrate que la hoja esté publicada: Archivo → Compartir → Publicar en la web → Publicar.");
    }

    async function obtenerDatos() {
        const icon = document.getElementById("sync-icon");
        const label = document.getElementById("sync-label");
        icon.classList.add("spinning"); label.textContent = "Actualizando…";
        try {
            log(`Solicitando GID ${GIDS[pestañaActiva]}…`, "info");
            const csv = await fetchConProxy(GIDS[pestañaActiva]);
            datos = parsearCSV(csv);
            renderizar();
            log(`Listo — ${datos.actividades.length} actividades · ${datos.staff.length} encargados`, "ok");
            label.textContent = "Sincronizado ✓";
        } catch(e) {
            log(`Error: ${e.message}`, "error");
            label.textContent = "Error de sync";
            document.getElementById("cronograma-body").innerHTML =
                `<tr><td colspan="7" class="state-cell">
                    <div class="state-icon">⚠️</div>
                    <div class="state-msg" style="color:#f87171;max-width:500px;margin:0 auto;">${e.message}</div>
                 </td></tr>`;
        } finally {
            icon.classList.remove("spinning");
        }
    }

    /* ── PARSE CSV ──
       Estructura de la hoja (basada en la captura):
         Col A(0): HORA INICIO  Col B(1): DURACIÓN  Col C(2): HORA FINAL
         Col D(3): ACTIVIDAD    Col E(4): DESCRIPCIÓN
         Col F(5): vacía/extra  Col G(6): AVISO (texto rojo en la hoja)

       La hoja también tiene filas de CABECERA de sección (solo col A o col B con el nombre
       del bloque, el resto vacías) y luego una sección de ENCARGADOS al final.
    ── */
    /* limpiar celda CSV */
    function limpiarCelda(s) { return (s || "").replace(/^[,;"\s]+|[,;"\s]+$/g, "").trim(); }

    function parsearCSV(texto) {
        const lineas = texto.split(/\r?\n/);
        const actividades = [];
        const staff = [];
        let bloqueActual = "PRODUCCIÓN";
        let modoStaff = false;
        let avisosPendientes = [];   /* avisos de col G que esperan una actividad */

        /* Detectar separador */
        const muestra = lineas.slice(0, 12).join("");
        const nSemi  = (muestra.match(/;/g)  || []).length;
        const nComa  = (muestra.match(/,/g)  || []).length;
        const sep = nSemi > nComa ? ";" : ",";
        log(`Separador: "${sep}"`, "info");

        const splitLine = (l) =>
            l.split(new RegExp(`${sep.replace(";","\\;")}(?=(?:[^"]*"[^"]*")*[^"]*$)`))
             .map(c => c.replace(/^"|"$/g, '').trim());

        /* ── Detectar cuántas columnas vacías hay al inicio (offset fijo) ──
           La hoja tiene col A vacía como margen. Detectamos el offset mirando
           la fila de cabecera "HORA INICIO" y viendo en qué índice aparece. */
        let colOffset = 0;
        for (const linea of lineas) {
            const cels = splitLine(linea);
            const idx = cels.findIndex(x => limpiarCelda(x).toUpperCase() === "HORA INICIO");
            if (idx >= 0) { colOffset = idx; break; }
        }
        log(`Offset de columnas detectado: ${colOffset}`, "info");

        /* Función para leer col por letra lógica (A=hora, B=dur, C=fin, D=act, E=desc, G=aviso) */
        const col = (c, n) => limpiarCelda(c[colOffset + n] || "");
        /* n: 0=HORA INICIO, 1=DURACIÓN, 2=HORA FINAL, 3=ACTIVIDAD, 4=DESCRIPCIÓN, 6=AVISO */

        for (let i = 0; i < lineas.length; i++) {
            if (!lineas[i].trim()) continue;
            const c = splitLine(lineas[i]);

            /* Valores de cada columna por posición fija */
            const cA = col(c, 0);  /* HORA INICIO */
            const cB = col(c, 1);  /* DURACIÓN */
            const cC = col(c, 2);  /* HORA FINAL */
            const cD = col(c, 3);  /* ACTIVIDAD */
            const cE = col(c, 4);  /* DESCRIPCIÓN */
            const cG = col(c, 6) || col(c, 5);  /* AVISO */

            /* Texto en cualquier celda sin offset (para detección de sección) */
            const c0raw = limpiarCelda(c[0] || "").toUpperCase();
            const c1raw = limpiarCelda(c[1] || "").toUpperCase();

            /* Saltar filas completamente vacías */
            if (c.every(x => !limpiarCelda(x))) continue;

            /* Saltar títulos decorativos */
            if (c0raw.includes("CRONOGRAMA GENERAL") || c1raw.includes("CRONOGRAMA GENERAL")) continue;
            if (cA.toUpperCase() === "HORA INICIO" || cA.toUpperCase() === "HORA") continue;

            /* ── SECCIÓN ENCARGADOS ──
               La cabecera de staff tiene "ÁREA" en col offset+0 y "ENCARGADOS" en col offset+1,
               O bien "ÁREA"/"AREA" en cualquier posición inicial. */
            const todoCeldasU = c.map(x => limpiarCelda(x).toUpperCase());
            if (todoCeldasU.includes("ENCARGADOS") || todoCeldasU.includes("ÁREA") && todoCeldasU.includes("ENCARGADOS")) {
                modoStaff = true;
                log(`Sección STAFF en línea ${i+1}`, "info");
                continue;
            }
            /* Detección alternativa: col 0 o col 1 es ÁREA/AREA sin offset */
            if (!modoStaff && (c0raw === "ÁREA" || c0raw === "AREA" || c1raw === "ÁREA" || c1raw === "AREA")) {
                modoStaff = true;
                log(`Sección STAFF (alt) en línea ${i+1}`, "info");
                continue;
            }

            /* ── MODO STAFF ── */
            if (modoStaff) {
                /* En la sección staff las columnas son: col offset+0 = ÁREA, col offset+1 = ENCARGADO */
                const area      = col(c, 0);
                const encargado = col(c, 1);
                const notas     = [col(c,2), col(c,3), col(c,4)].filter(Boolean).join(" · ");
                if (encargado) {
                    /* Herencia de área para celdas fusionadas (Switcher, etc.) */
                    const areaFinal = area || (staff.length > 0 ? staff[staff.length-1].area : "");
                    staff.push({ area: areaFinal, encargado, notas });
                }
                continue;
            }

            /* Aviso de col G en cualquier fila */
            const avisoRaw = cG;

            /* ── FILA DE BLOQUE ──
               Criterio seguro: solo col A (hora) tiene texto con formato de nombre de sección
               (no parece una hora) Y cols B,C,D,E vacías.
               Excepción: si col D tiene texto, es actividad aunque A,B,C estén vacías. */
            const soloColA = cA && !cB && !cC && !cD && !cE;
            const esHora   = /^\d{1,2}[:.]\d{2}/.test(cA);  /* "7:56", "8:00 a.m." etc */
            if (soloColA && !esHora) {
                if (avisoRaw) avisosPendientes.push(avisoRaw);
                bloqueActual = cA;
                log(`Bloque: "${bloqueActual}"`, "info");
                continue;
            }

            /* ── FILA DE ACTIVIDAD ──
               Puede tener hora (cA) o no (celda fusionada → heredar de anterior).
               Lo que importa es que cD tenga el nombre de la actividad. */
            const actividad   = cD;
            const descripcion = cE;

            /* Fila sin actividad útil → guardar aviso y seguir */
            if (!actividad || actividad === bloqueActual) {
                if (avisoRaw) avisosPendientes.push(avisoRaw);
                continue;
            }

            /* Herencia de hora para celdas fusionadas verticalmente */
            const ultimaAct = actividades.length > 0 ? actividades[actividades.length-1] : null;
            const horaInicio = cA || (ultimaAct ? ultimaAct.horaInicio : "");
            const duracion   = cB || (ultimaAct ? ultimaAct.duracion   : "");
            const horaFinal  = cC || (ultimaAct ? ultimaAct.horaFinal  : "");

            /* Acumular avisos */
            if (avisoRaw) avisosPendientes.push(avisoRaw);
            const avisoFinal = [...new Set(avisosPendientes)].join(" · ");
            avisosPendientes = [];

            actividades.push({ horaInicio, duracion, horaFinal, bloque: bloqueActual, actividad, descripcion, aviso: avisoFinal });
        }

        return { actividades, staff };
    }

    /* ── HELPERS ── */
    function clasePill(bloque) {
        const b = bloque.toUpperCase();
        if (b.includes("PREVIO"))                                        return "pill-previo";
        if (b.includes("TRANSMIS") || b.includes("INICIO") || b.includes("TIMER")) return "pill-transmision";
        if (b.includes("ALABANZA") || b.includes("ADORAC"))             return "pill-alabanza";
        if (b.includes("MENSAJE")  || b.includes("BIENVENIDA") ||
            b.includes("PALABRA")  || b.includes("PREDICAC"))           return "pill-mensaje";
        if (b.includes("MINISTR")  || b.includes("ALTAR"))              return "pill-ministracion";
        return "pill-cierre";
    }
    function claseCard(b) { return clasePill(b).replace("pill-","card-"); }

    /* ── PARSE HORA → minutos ── */
    function parseTime(t) {
        if (!t) return null;
        const m = t.match(/(\d{1,2})[:\.](\d{2})\s*(am|pm|a\.m\.|p\.m\.)?/i);
        if (!m) return null;
        let h = parseInt(m[1]), min = parseInt(m[2]);
        if (m[3]) {
            const ap = m[3].toLowerCase().replace(/\./g,"");
            if (ap === "pm" && h !== 12) h += 12;
            if (ap === "am" && h === 12) h = 0;
        }
        return h * 60 + min;
    }

    /* ── BANNER ACTIVO ── */
    function actualizarBannerActivo() {
        const banner = document.getElementById("active-banner");
        const { actividades } = datos;
        if (!actividades.length) { banner.style.display = "none"; return; }

        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        let activo = null;
        for (const a of actividades) {
            const s = parseTime(a.horaInicio), e = parseTime(a.horaFinal);
            if (s !== null && e !== null && nowMin >= s && nowMin < e) { activo = { ...a, s, e }; break; }
        }

        document.querySelectorAll(".row-active").forEach(r => r.classList.remove("row-active"));
        document.querySelectorAll(".card-active").forEach(c => c.classList.remove("card-active"));

        if (activo) {
            const pct = Math.min(100, Math.round(((nowMin - activo.s) / (activo.e - activo.s)) * 100));
            document.getElementById("banner-title").textContent = activo.actividad;
            document.getElementById("banner-block").textContent = activo.bloque;
            document.getElementById("banner-time").textContent  = `${activo.horaInicio} – ${activo.horaFinal}`;
            document.getElementById("banner-progress").style.width = pct + "%";
            banner.style.display = "block";
            const idx = actividades.findIndex(a => a.actividad === activo.actividad && a.horaInicio === activo.horaInicio);
            document.getElementById(`row-${idx}`)?.classList.add("row-active");
            document.getElementById(`card-${idx}`)?.classList.add("card-active");
        } else {
            banner.style.display = "none";
        }
    }

    /* ── STATS ── */
    function renderStats() {
        const { actividades, staff } = datos;
        const bloques = [...new Set(actividades.map(a => a.bloque))].length;
        const conAviso = actividades.filter(a => a.aviso).length;
        document.getElementById("stats-row").innerHTML =
            `<div class="stat-chip"><span>${actividades.length}</span> actividades</div>
             <div class="stat-chip"><span>${bloques}</span> bloques</div>
             <div class="stat-chip"><span>${staff.length}</span> encargados</div>
             ${conAviso ? `<div class="stat-chip" style="border-color:rgba(251,191,36,.3);color:var(--c-aviso)"><span>${conAviso}</span> avisos</div>` : ""}`;
    }

    /* ── RENDER TABLE ── */
    function renderTable() {
        const { actividades, staff } = datos;
        let html = "";

        if (!actividades.length) {
            html = `<tr><td colspan="7" class="state-cell"><div class="state-icon">📭</div><div class="state-msg">No se encontraron datos estructurados.<br><small style="color:var(--text-muted);font-size:11px;">Revisa la consola para detalles del parsing.</small></div></td></tr>`;
        } else {
            for (let i = 0; i < actividades.length; i++) {
                const a = actividades[i];
                const pill = clasePill(a.bloque);
                const avisoHTML = a.aviso
                    ? `<span class="aviso-badge">⚠ ${a.aviso}</span>`
                    : `<span style="color:var(--border)">—</span>`;
                html += `
                <tr id="row-${i}">
                    <td class="time-cell">${a.horaInicio}</td>
                    <td><span class="duration-chip">${a.duracion || '—'}</span></td>
                    <td class="time-cell" style="color:var(--text-sub)">${a.horaFinal}</td>
                    <td><span class="bloque-pill ${pill}"><span class="bloque-dot"></span>${a.bloque}</span></td>
                    <td class="actividad-cell">${a.actividad}</td>
                    <td class="desc-cell">${a.descripcion}</td>
                    <td>${avisoHTML}</td>
                </tr>`;
            }
        }

        if (staff.length) {
            html += `<tr class="staff-section-header"><td colspan="7"><span class="staff-section-label">▸ EQUIPO TÉCNICO / ENCARGADOS</span></td></tr>`;
            for (const s of staff) {
                html += `
                <tr>
                    <td colspan="3" style="color:var(--text-muted);font-size:11px;font-family:'JetBrains Mono',monospace;">STAFF</td>
                    <td style="font-weight:700;color:var(--text-main)">${s.area}</td>
                    <td class="staff-name-cell">${s.encargado}</td>
                    <td class="desc-cell" colspan="2">${s.notas}</td>
                </tr>`;
            }
        }

        document.getElementById("cronograma-body").innerHTML = html;
    }

    /* ── RENDER CARDS ── */
    function renderCards() {
        const { actividades, staff } = datos;
        let html = "";

        if (!actividades.length) {
            html = `<div style="text-align:center;padding:60px 20px;color:var(--text-muted)">No hay datos para mostrar.</div>`;
        } else {
            for (let i = 0; i < actividades.length; i++) {
                const a = actividades[i];
                const pill = clasePill(a.bloque);
                const bg   = claseCard(a.bloque);
                const avisoCol = a.aviso
                    ? `<div class="card-aviso"><span class="aviso-badge" style="flex-direction:column;gap:2px;padding:6px 10px;text-align:center">
                            <span style="font-size:14px">⚠</span>
                            <span style="font-size:10px;white-space:normal;max-width:100px;line-height:1.3">${a.aviso}</span>
                       </span></div>`
                    : "";
                html += `
                <div class="card ${bg}" id="card-${i}">
                    <div class="card-time">
                        <div class="card-time-start">${a.horaInicio || '—'}</div>
                        <div class="card-time-dur">${a.duracion || ''}</div>
                        ${a.horaFinal ? `<div class="card-time-end">${a.horaFinal}</div>` : ''}
                    </div>
                    <div class="card-body">
                        <div class="card-header-row">
                            <span class="bloque-pill ${pill}"><span class="bloque-dot"></span>${a.bloque}</span>
                        </div>
                        <div class="card-actividad">${a.actividad}</div>
                        ${a.descripcion ? `<div class="card-desc">${a.descripcion}</div>` : ''}
                    </div>
                    ${avisoCol}
                </div>`;
            }
        }

        document.getElementById("card-timeline").innerHTML = html;

        let staffHtml = "";
        if (staff.length) {
            staffHtml = `<div class="staff-section-title">▸ EQUIPO TÉCNICO / ENCARGADOS</div><div class="staff-grid">`;
            for (const s of staff) {
                staffHtml += `
                <div class="staff-card">
                    <div class="staff-card-area">${s.area}</div>
                    <div class="staff-card-name">${s.encargado}</div>
                    ${s.notas ? `<div class="staff-card-notes">${s.notas}</div>` : ''}
                </div>`;
            }
            staffHtml += `</div>`;
        }
        document.getElementById("staff-card-section").innerHTML = staffHtml;
    }

    /* ── RENDER PRINCIPAL ── */
    function renderizar() {
        renderStats();
        renderTable();
        renderCards();
        actualizarBannerActivo();
    }

    /* ── VISTA ── */
    function setView(v) {
        vistaActual = v;
        document.getElementById("table-view").style.display = v === "table" ? "block" : "none";
        document.getElementById("card-view").style.display  = v === "card"  ? "block" : "none";
        document.getElementById("btn-table").classList.toggle("active", v === "table");
        document.getElementById("btn-card").classList.toggle("active",  v === "card");
    }

    /* ── TABS ── */
    function cambiarPestaña(index, boton) {
        pestañaActiva = index;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        boton.classList.add('active');
        document.getElementById("cronograma-body").innerHTML =
            `<tr><td colspan="7" class="state-cell"><div class="state-icon">⟳</div><div class="state-msg">Cargando…</div></td></tr>`;
        document.getElementById("card-timeline").innerHTML = "";
        obtenerDatos();
    }

    /* ── INIT ── */
    window.onload = () => {
        setView("table");
        obtenerDatos();
        setInterval(obtenerDatos, POLL_INTERVAL);
        setInterval(actualizarBannerActivo, 30000);
    };
</script>
</body>
</html>
