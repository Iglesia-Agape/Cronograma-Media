<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma de Producción - Ágape Media</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            
            /* Paleta multimedia */
            --bg-previo: #471b56;      /* Púrpura */
            --bg-transmision: #651a1a; /* Rojo */
            --bg-alabanza: #1e3a8a;    /* Azul */
            --bg-mensaje: #7c2d12;     /* Naranja/Café */
            --bg-ministracion: #064e3b;/* Verde */
            --bg-cierre: #334155;      /* Gris */
            --bg-staff: #0f172a;       /* Fondo oscuro para encargados */
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 25px;
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }

        .status-badge {
            background-color: #10b981;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px; height: 8px; background-color: white; border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }

        .tab-btn {
            background-color: var(--bg-card); color: var(--text-muted);
            border: 1px solid var(--border); padding: 12px 24px;
            border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background-color: var(--accent); color: var(--bg-main); border-color: var(--accent);
        }

        .table-container {
            background-color: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; margin-bottom: 25px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th {
            background-color: #111827; padding: 16px; font-size: 14px;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-muted); border-bottom: 1px solid var(--border);
        }

        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 15px; vertical-align: top; }
        tr:last-child td { border-bottom: none; }
        
        .time-cell { font-weight: 700; color: var(--accent); white-space: nowrap; }
        .duration-badge { background-color: rgba(248, 250, 252, 0.1); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        .bloque-tag {
            display: inline-block; padding: 4px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .bg-previo { background-color: var(--bg-previo); }
        .bg-transmision { background-color: var(--bg-transmision); }
        .bg-alabanza { background-color: var(--bg-alabanza); }
        .bg-mensaje { background-color: var(--bg-mensaje); }
        .bg-ministracion { background-color: var(--bg-ministracion); }
        .bg-cierre { background-color: var(--bg-cierre); }
        
        /* Estilos para la subtabla de Staff / Encargados */
        .staff-header {
            background-color: #1e293b;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .staff-row { background-color: rgba(15, 23, 42, 0.4); }
        .staff-area { font-weight: 700; color: #e2e8f0; }

        #debug-log {
            background: #000; color: #10b981; font-family: monospace;
            padding: 15px; border-radius: 8px; font-size: 12px;
            max-height: 150px; overflow-y: auto; border: 1px solid #22c55e;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>CRONOGRAMA GENERAL DE MEDIA</h1>
            <p style="margin: 5px 0 0 0; color: var(--text-muted);">Sincronización Total (Pauta + Encargados Técnicos)</p>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div> MONITOR ACTIVO
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarPestaña(0, this)">Ágape (Primera)</button>
        <button class="tab-btn" onclick="cambiarPestaña(1, this)">Ágape (Segunda)</button>
        <button class="tab-btn" onclick="cambiarPestaña(2, this)">Explosión</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%">Horario / Info</th>
                    <th style="width: 10%">Duración</th>
                    <th style="width: 20%">Bloque / Área</th>
                    <th style="width: 25%">Actividad / Encargado</th>
                    <th style="width: 30%">Descripción / Notas de Control</th>
                </tr>
            </thead>
            <tbody id="cronograma-body">
                <tr>
                    <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">
                        Cargando flujo de datos multimedia...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3 style="color: var(--text-muted); font-size: 14px; margin-bottom: 5px;">Consola del Sistema:</h3>
    <div id="debug-log">Iniciando secuenciador de pautas...</div>

    <script>
        const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHX3umAF4N-HNU7qVBBj7TF6mHZTz9VIzNoAnyd1-kRL6J1Ig1zAdNnmMg9sb9dI7nS9N9XEc82wGb/pub?output=csv";
        
        const GIDS = {
            0: "1584889573", // Ágape(Primera)
            1: "1151618335", // Ágape(Segunda)
            2: "1931811566"  // Explosión
        };

        let pestañaActivaIndex = 0;

        function logSystem(mensaje, esError = false) {
            const consoleBox = document.getElementById("debug-log");
            const color = esError ? "#ef4444" : "#10b981";
            consoleBox.innerHTML += `<br><span style="color: ${color}">[${new Date().toLocaleTimeString()}] ${mensaje}</span>`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        async function obtenerDatosCSV() {
            try {
                const urlCompleta = `${BASE_URL}&gid=${GIDS[pestañaActivaIndex]}&single=true&cachebust=${new Date().getTime()}`;
                
                logSystem(`Solicitando pauta para pestaña index [${pestañaActivaIndex}]...`);
                const respuesta = await fetch(urlCompleta);
                const textoCSV = await respuesta.text();
                procesarPautaProduccion(textoCSV);
            } catch (error) {
                console.error(error);
                logSystem(`⚠️ Error de conexión al refrescar datos.`, true);
            }
        }

        function procesarPautaProduccion(texto) {
            const lineas = texto.split(/\r?\n/);
            const tablaBody = document.getElementById("cronograma-body");
            let htmlFilas = "";
            let bloqueActual = "PRODUCCIÓN";
            let filasProcesadas = 0;
            let esSeccionEncargados = false;

            // Detector automático de separador regional
            let separador = ",";
            if (lineas.length > 3) {
                const bloqueMuestra = lineas.slice(0, 8).join("");
                const puntosComas = (bloqueMuestra.match(/;/g) || []).length;
                const comas = (bloqueMuestra.match(/,/g) || []).length;
                if (puntosComas > comas) separador = ";";
            }

            for (let i = 0; i < lineas.length; i++) {
                if (!lineas[i].trim()) continue;

                let celdas = lineas[i].split(new RegExp(`${separador}(?=(?:[^"]*"[^"]*")*[^"]*$)`)).map(c => c.replace(/"/g, '').trim());

                if (celdas[0] === "" && celdas.length > 1) {
                    celdas.shift();
                }

                if (celdas.length === 0 || (celdas.length === 1 && celdas[0] === "")) continue;

                if (celdas[0] && celdas[0].toUpperCase().includes("CRONOGRAMA GENERAL")) continue;
                if (celdas[0] === "HORA INICIO") continue;

                // DETECTOR DE CONTROL: Si encontramos la cabecera de encargados, activamos el modo Staff
                if (celdas[0] === "ÁREA" || celdas[0] === "AREA" || celdas[1] === "ENCARGADOS" || celdas[0].includes("ÁREAS")) {
                    esSeccionEncargados = true;
                    htmlFilas += `
                        <tr class="staff-header">
                            <td colspan="2">Estructura Operativa</td>
                            <td>Área Técnica</td>
                            <td>Encargado Asignado</td>
                            <td>Notas de Entrega / Equipos</td>
                        </tr>
                    `;
                    continue; 
                }

                // --- MODO 1: PROCESAR ENCARGADOS ---
                if (esSeccionEncargados) {
                    const area = celdas[0] || "";
                    const encargado = celdas[1] || "";
                    const notasStaff = celdas[2] || celdas[3] || celdas[4] || "";

                    if (area || encargado) {
                        filasProcesadas++;
                        htmlFilas += `
                            <tr class="staff-row">
                                <td colspan="2" style="color: var(--text-muted); font-size: 13px; font-weight: bold;">[ STAFF MEDIA ]</td>
                                <td class="staff-area">${area}</td>
                                <td style="font-weight: 600; color: var(--accent);">${encargado}</td>
                                <td style="color: var(--text-muted); font-size: 14px;">${notasStaff}</td>
                            </tr>
                        `;
                    }
                    continue;
                }

                // --- MODO 2: PROCESAR ACTIVIDADES NORMALES ---
                const restoVacio = celdas.slice(1).every(c => c === "" || c === undefined);
                if (celdas[0] && restoVacio) {
                    bloqueActual = celdas[0];
                    continue;
                }

                const horaInicio = celdas[0] || "";
                const duracion = celdas[1] || "";
                const horaFinal = celdas[2] || "";
                const actividad = celdas[3] || "";
                const descripcion = celdas[4] || "";

                if (actividad && actividad !== bloqueActual) {
                    filasProcesadas++;
                    htmlFilas += `
                        <tr>
                            <td class="time-cell">${horaInicio} ${horaFinal ? '- ' + horaFinal : ''}</td>
                            <td><span class="duration-badge">${duracion || '-'}</span></td>
                            <td><span class="bloque-tag ${obtenerClaseBloque(bloqueActual)}">${bloqueActual}</span></td>
                            <td style="font-weight: 600; color: #fff;">${actividad}</td>
                            <td style="color: var(--text-muted); white-space: pre-line;">${descripcion}</td>
                        </tr>
                    `;
                }
            }

            logSystem(`Renderizado completo con éxito. Filas cargadas (Pauta + Staff): ${filasProcesadas}`);
            tablaBody.innerHTML = htmlFilas || `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">No se encontraron datos estructurados.</td></tr>`;
        }

        function obtenerClaseBloque(bloque) {
            const b = block = bloque.toUpperCase();
            if (b.includes("PREVIO")) return "bg-previo";
            if (b.includes("TRANSMISIÓN") || b.includes("INICIO") || b.includes("TIMER")) return "bg-transmision";
            if (b.includes("ALABANZA") || b.includes("ADORACIÓN")) return "bg-alabanza";
            if (b.includes("MENSAJE") || b.includes("BIENVENIDA") || b.includes("PALABRA") || b.includes("PREDICACIÓN")) return "bg-mensaje";
            if (b.includes("MINISTRACIÓN") || b.includes("ALTAR")) return "bg-ministracion";
            return "bg-cierre";
        }

        function cambiarPestaña(index, boton) {
            pestañaActivaIndex = index;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            boton.classList.add('active');
            
            document.getElementById("cronograma-body").innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">Cargando bloque técnico...</td></tr>`;
            obtenerDatosCSV();
        }

        window.onload = () => {
            obtenerDatosCSV();
            setInterval(obtenerDatosCSV, 15000); // Polling automático cada 15 segundos
        };
    </script>
</body>
</html>
